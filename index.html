<!doctype html>
<html lang="it" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C00000" />
    <meta name="description" content="TimePro — registro presenze e ore straordinarie. App mobile-first, offline, export Excel." />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TimePro — Registro presenze" />
    <meta property="og:description" content="Saisie horaires, calendrier, dashboard et export Excel. Italiano e darija marocchina." />
    <meta property="og:image" content="/logo.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TimePro" />
    <meta name="twitter:description" content="Registro presenze e ore straordinarie — mobile-first, offline." />
    <meta name="twitter:image" content="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>TimePro — Registro presenze</title>
    <style id="theme-flash-guard">
      html {
        background-color: #fafaf9;
        color: #2c2420;
      }
      html.dark {
        background-color: #1a1412;
        color: #f3f3f1;
        color-scheme: dark;
      }
      body,
      #root {
        background-color: inherit;
        color: inherit;
      }
      body {
        margin: 0;
        min-height: 100svh;
      }
    </style>
    <script>
      (function () {
        try {
          document.documentElement.classList.add('no-theme-transition')
          var raw = localStorage.getItem('timepro-v1')
          if (!raw) return
          var data = JSON.parse(raw)
          var state = data.state || data
          var theme = state.theme || 'system'
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#1a1412' : '#C00000')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
